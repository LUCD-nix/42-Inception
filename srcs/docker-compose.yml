services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: inception-nginx:bookworm
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "${NGINX_PORT}:443"
    volumes:
      - wp_content:/var/www/html:ro
      # Optional: if you manage full core as a volume, mount ./html too
      # - ./html:/var/www/html
    secrets:
      - ssl_subject
    environment:
      SSL_SUBJECT_FILE: /run/secrets/ssl_subject
    networks:
      - inception
    healthcheck:
      test: ["CMD-SHELL", "curl -kfsS https://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 1

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: inception-wordpress:bookworm
    environment:
      WORDPRESS_DB_HOST: ${DB_HOST}
      WORDPRESS_DB_USER_FILE: /run/secrets/db_user
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      WORDPRESS_DB_NAME: ${DB_NAME}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT}
    secrets:
      - db_user
      - db_password
    volumes:
      - wp_content:/var/www/html/
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inception
    healthcheck:
      test: ["CMD-SHELL", "php-fpm8.2 -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: inception-mariadb:bookworm
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER_FILE: /run/secrets/db_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER_FILE: /run/secrets/db_user
      MARIADB_PASSWORD_FILE: /run/secrets/db_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    secrets:
      - db_user
      - db_password
      - db_root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    healthcheck:
      test: [
        "CMD-SHELL",
        "mariadb-admin ping -h localhost -uroot -p\"$$(cat /run/secrets/db_root_password)\" --silent"
      ]
      interval: 10s
      timeout: 5s
      retries: 10

secrets:
  db_user:
    file: ../secrets/db_user.txt
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  ssl_subject:
    file: ../secrets/ssl_subject.txt

networks:
  inception:
  # it is the default, we don't have to specify
    driver: bridge

volumes:
  db_data:
    name: db_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MARIADB_DATA_PATH}

  wp_content:
    name: wp_content
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORDPRESS_DATA_PATH}
